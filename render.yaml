services:
  - type: web
    name: bookbridge
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: bookbridge-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
